<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>For You 🩵</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #e0f7ff, #bae8ff, #d0f0ff);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh; /* support dynamic viewport di mobile */
      overflow: hidden;
    }

    /* CARD */
    .card {
      width: min(340px, 92vw);
      padding: clamp(20px, 6vw, 30px) clamp(16px, 5vw, 25px);
      border-radius: 28px;
      background: #eaf6ff;
      box-shadow: 12px 12px 28px #b8d8ea,
        -12px -12px 28px #ffffff;
      text-align: center;
      position: relative;
    }

    /* PAGE */
    .page {
      display: none;
      animation: fade 0.5s ease;
    }

    .page.active {
      display: block;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h2 {
      color: #2196F3;
      margin-bottom: 8px;
      font-size: clamp(16px, 5vw, 22px);
    }

    p {
      color: #4a90b8;
      line-height: 1.6;
      font-size: clamp(13px, 3.5vw, 15px);
    }

    /* ===== PAGE 0 – WELCOME ===== */
    .welcome-emoji {
      font-size: clamp(48px, 15vw, 64px);
      display: block;
      margin-bottom: 10px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .welcome-title {
      font-size: clamp(18px, 5.5vw, 22px);
      font-weight: 600;
      color: #1a7bbf;
      margin: 0 0 8px;
    }

    .welcome-sub {
      font-size: clamp(12px, 3.5vw, 13px);
      color: #5aaccf;
      margin-bottom: 20px;
    }

    /* ===== PIN ===== */
    #pin {
      letter-spacing: clamp(8px, 3vw, 14px);
      font-size: clamp(22px, 7vw, 28px);
      margin: 16px 0;
      color: #1a7bbf;
    }

    /* KEYPAD */
    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(10px, 3vw, 14px);
    }

    .key {
      padding: clamp(14px, 4.5vw, 18px);
      border-radius: 50%;
      background: #eaf6ff;
      box-shadow: 5px 5px 12px #b8d8ea,
        -5px -5px 12px #ffffff;
      cursor: pointer;
      font-size: clamp(16px, 5vw, 18px);
      font-weight: 500;
      color: #1a7bbf;
      transition: .15s;
      user-select: none;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .key:active {
      box-shadow: inset 5px 5px 12px #b8d8ea,
        inset -5px -5px 12px #ffffff;
      transform: scale(0.95);
    }

    /* BUTTON */
    .btn {
      margin-top: 18px;
      padding: 13px 0;
      width: 100%;
      border-radius: 22px;
      background: linear-gradient(45deg, #29b6f6, #4fc3f7, #81d4fa);
      color: white;
      font-family: 'Poppins', sans-serif;
      font-size: clamp(14px, 4vw, 15px);
      font-weight: 500;
      cursor: pointer;
      transition: .3s;
      border: none;
      box-shadow: 0 5px 18px rgba(41, 182, 246, 0.35);
      letter-spacing: 0.5px;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 24px rgba(41, 182, 246, 0.45);
    }

    /* TYPING */
    #typing {
      white-space: pre-line;
      color: #2c7da0;
      font-size: clamp(12px, 3.5vw, 14px);
      text-align: left;
      padding: 10px 5px;
      min-height: 90px;
    }

    #typing::after {
      content: "|";
      animation: blink 1s infinite;
      color: #29b6f6;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    /* SLIDER */
    .slider img {
      width: 100%;
      border-radius: 18px;
      transition: .5s;
      box-shadow: 0 6px 20px rgba(41, 182, 246, 0.2);
    }

    /* MUSIC */
    audio {
      width: 100%;
      margin-top: 15px;
    }

    .music-img {
      width: 100%;
      border-radius: 18px;
      margin-bottom: 15px;
      box-shadow: 0 6px 20px rgba(41, 182, 246, 0.25);
    }

    .music-sub {
      margin-top: 10px;
      color: #5aaccf;
      font-size: clamp(12px, 3.5vw, 13px);
    }

    /* HEART */
    .heart {
      position: fixed;
      animation: float 3.5s linear forwards;
      pointer-events: none;
      font-size: 22px;
      z-index: 999;
    }

    @keyframes float {
      from {
        transform: translateY(0);
        opacity: 1;
      }

      to {
        transform: translateY(-320px);
        opacity: 0;
      }
    }

    /* Stars on welcome page */
    .star {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #29b6f6;
      animation: twinkle 2.5s infinite alternate;
      opacity: 0.5;
    }

    @keyframes twinkle {
      from {
        opacity: 0.2;
        transform: scale(0.8);
      }

      to {
        opacity: 0.9;
        transform: scale(1.4);
      }
    }

    /* ===== RESPONSIF LAYAR SANGAT KECIL (< 360px) ===== */
    @media (max-width: 360px) {
      .card {
        border-radius: 20px;
      }

      .key {
        padding: 12px;
      }
    }
  </style>
</head>

<body>

  <div class="card">

    <!-- PAGE 0 – HALAMAN AWAL -->
    <div class="page active" id="page0">
      <!-- dekorasi bintang -->
      <div class="star" style="top:20px;left:25px;animation-delay:.3s"></div>
      <div class="star" style="top:35px;right:30px;animation-delay:.8s;width:8px;height:8px"></div>
      <div class="star" style="bottom:70px;left:18px;animation-delay:1.2s"></div>
      <div class="star" style="bottom:55px;right:22px;animation-delay:.5s;width:5px;height:5px"></div>

      <span class="welcome-emoji">🩵</span>
      <p class="welcome-title">Hai, Sayang~</p>
      <p class="welcome-sub">Ada sesuatu spesial yang aku siapkan<br>khusus buat kamu 🌤️</p>

      <button class="btn" onclick="next(1)">Mulai &nbsp;→</button>
    </div>

    <!-- PAGE 1 – PIN -->
    <div class="page" id="page1">
      <h2>Enter PIN 🩵</h2>
      <div id="pin">_ _ _ _</div>

      <div class="keypad">
        <div class="key" onclick="press(1)">1</div>
        <div class="key" onclick="press(2)">2</div>
        <div class="key" onclick="press(3)">3</div>
        <div class="key" onclick="press(4)">4</div>
        <div class="key" onclick="press(5)">5</div>
        <div class="key" onclick="press(6)">6</div>
        <div class="key" onclick="press(7)">7</div>
        <div class="key" onclick="press(8)">8</div>
        <div class="key" onclick="press(9)">9</div>
        <div></div>
        <div class="key" onclick="press(0)">0</div>
        <div class="key" onclick="del()">⌫</div>
      </div>
    </div>

    <!-- PAGE 2 – PESAN -->
    <div class="page" id="page2">
      <h2>Happy Birthday My Love 🩵</h2>
      <p id="typing"></p>
      <button class="btn" onclick="next(3)">Next 🩵</button>
    </div>

    <!-- PAGE 3 – FOTO -->
    <div class="page" id="page3">
      <h2>Our Memory 🥰</h2>
      <div class="slider">
        <img id="slide" src="1.png" alt="memory">
      </div>
      <button class="btn" onclick="next(4)">Next 🩵</button>
    </div>

    <!-- PAGE 4 – MUSIK -->
    <div class="page" id="page4">
      <h2>Music For U 🎵</h2>
      <img src="kamu.jpeg" class="music-img" alt="kamu">
      <audio id="music" controls>
        <source src="music.mp3" type="audio/mpeg">
      </audio>
      <p class="music-sub">This song reminds me of you 💖</p>
    </div>

  </div>

  <script>
    /* ===== PIN ===== */
    let input = "";
    const correctPin = "0704";

    function press(n) {
      if (input.length < 4) {
        input += n;
        document.getElementById("pin").innerText = input.replace(/./g, "• ").trim();
      }
      if (input.length === 4) {
        if (input === correctPin) {
          setTimeout(() => next(2), 300);
        } else {
          document.getElementById("pin").style.color = "#f44336";
          setTimeout(() => {
            document.getElementById("pin").style.color = "#1a7bbf";
            document.getElementById("pin").innerText = "_ _ _ _";
            input = "";
          }, 700);
        }
      }
    }

    function del() {
      if (input.length > 0) {
        input = input.slice(0, -1);
        document.getElementById("pin").innerText =
          input.length === 0 ? "_ _ _ _"
            : (input.replace(/./g, "• ").trim() + " _".repeat(4 - input.length));
      }
    }

    /* ===== TYPING EFFECT ===== */
    const text = `
Selamat ulang tahun ya sayang, semoga di umur yang baru ini semua hal baik selalu datang ke hidup kamu, kesehatan, kebahagiaan, dan semua impian yang kamu inginkan bisa tercapai satu per satu. Terima kasih sudah hadir dan jadi bagian paling berarti dalam hidup aku, semoga kita selalu bisa saling nemenin dan bertahan sampai kapan pun. 🩵`;

    let i = 0;
    function typeEffect() {
      if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 40);
      }
    }

    /* ===== PAGE NAV ===== */
    function next(p) {
      document.querySelectorAll(".page").forEach(x => x.classList.remove("active"));
      document.getElementById("page" + p).classList.add("active");
      if (p === 2) { document.getElementById("typing").innerHTML = ""; i = 0; typeEffect(); }
      if (p === 4) { document.getElementById("music").play(); startHearts(); }
    }

    /* ===== SLIDER AUTO ===== */
    const images = ["1.png", "2.png", "3.png", "4.png", "5.png"];
    let idx = 0;
    setInterval(() => {
      idx = (idx + 1) % images.length;
      const slide = document.getElementById("slide");
      slide.style.opacity = "0";
      setTimeout(() => { slide.src = images[idx]; slide.style.opacity = "1"; }, 300);
    }, 3000);

    /* ===== HEARTS ===== */
    function startHearts() {
      setInterval(() => {
        let h = document.createElement("div");
        h.className = "heart";
        h.innerHTML = "🩵";
        h.style.left = Math.random() * window.innerWidth + "px";
        h.style.top = window.innerHeight + "px";
        document.body.appendChild(h);
        setTimeout(() => h.remove(), 3500);
      }, 300);
    }
  </script>

</body>

</html>
